services:
  configsvr1:
    image: mongo:7.0
    container_name: configsvr1
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    ports:
      - "27119:27019"
    volumes:
      - configsvr1_data:/data/db

  configsvr2:
    image: mongo:7.0
    container_name: configsvr2
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    ports:
      - "27120:27019"
    volumes:
      - configsvr2_data:/data/db

  configsvr3:
    image: mongo:7.0
    container_name: configsvr3
    command: ["mongod", "--configsvr", "--replSet", "configReplSet", "--port", "27019", "--bind_ip_all"]
    ports:
      - "27121:27019"
    volumes:
      - configsvr3_data:/data/db

  shard1a:
    image: mongo:7.0
    container_name: shard1a
    command: ["mongod", "--shardsvr", "--replSet", "shard1rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27218:27018"
    volumes:
      - shard1a_data:/data/db

  shard1b:
    image: mongo:7.0
    container_name: shard1b
    command: ["mongod", "--shardsvr", "--replSet", "shard1rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27219:27018"
    volumes:
      - shard1b_data:/data/db

  shard1c:
    image: mongo:7.0
    container_name: shard1c
    command: ["mongod", "--shardsvr", "--replSet", "shard1rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27220:27018"
    volumes:
      - shard1c_data:/data/db

  shard2a:
    image: mongo:7.0
    container_name: shard2a
    command: ["mongod", "--shardsvr", "--replSet", "shard2rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27318:27018"
    volumes:
      - shard2a_data:/data/db

  shard2b:
    image: mongo:7.0
    container_name: shard2b
    command: ["mongod", "--shardsvr", "--replSet", "shard2rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27319:27018"
    volumes:
      - shard2b_data:/data/db

  shard2c:
    image: mongo:7.0
    container_name: shard2c
    command: ["mongod", "--shardsvr", "--replSet", "shard2rs", "--port", "27018", "--bind_ip_all"]
    ports:
      - "27320:27018"
    volumes:
      - shard2c_data:/data/db

  mongos:
    image: mongo:7.0
    container_name: mongos
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
      - shard1a
      - shard1b
      - shard1c
      - shard2a
      - shard2b
      - shard2c
    command:
      [
        "mongos",
        "--configdb",
        "configReplSet/configsvr1:27019,configsvr2:27019,configsvr3:27019",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    ports:
      - "27017:27017"

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1a_data:
  shard1b_data:
  shard1c_data:
  shard2a_data:
  shard2b_data:
  shard2c_data:
